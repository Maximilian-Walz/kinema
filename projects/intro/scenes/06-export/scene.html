<!-- Export: the real dialog (fps + scope), then the frozen-time render pipeline
     and a filling progress bar landing on one MP4. -->
<div class="ovl on" id="o6" style="transition:none">
  <div class="heading" id="hd">EXPORT TO MP4</div>

  <div class="dialog" id="dialog">
    <div class="dhd">Export MP4</div>
    <div class="drow"><span class="dl">frame rate</span><span class="sel">30 fps <span>&#9662;</span></span></div>
    <div class="drow"><span class="dl">scope</span>
      <span class="sbtn">this scene</span><span class="sbtn hot">full video</span></div>
  </div>

  <div class="pipe">
    <div class="box" id="p1">scenes<br><b>frozen time</b></div>
    <div class="arr" id="a1">&rarr;</div>
    <div class="box" id="p2">headless<br><b>Chrome</b></div>
    <div class="arr" id="a2">&rarr;</div>
    <div class="box" id="p3"><b>ffmpeg</b><br>+ your takes</div>
    <div class="arr" id="a3">&rarr;</div>
    <div class="box mp4" id="p4"><b>video.mp4</b></div>
  </div>

  <div class="prog" id="prog"><b id="bar"></b></div>
  <div class="note" id="enote">frame&#8209;exact &middot; identical on every run</div>
</div>

<div id="caption"></div>
