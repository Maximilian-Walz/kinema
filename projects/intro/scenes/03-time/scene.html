<!-- A mock of TIME mode: the transport strip (TIME active) over the global
     timeline with its four real lanes. One SCRIPT clip slides to snap against
     the playhead while the snap guide lights up. -->
<div class="ovl on" id="o3" style="transition:none">
  <div class="win" id="win">

    <div class="bar">
      <span class="bchip" id="bRec">RECORD</span>
      <span class="bchip" id="bTune">TUNE</span>
      <span class="bchip hot" id="bTime">TIME</span>
      <span class="bchip" id="bScene">SCENE</span>
      <span class="bsep"></span>
      <span class="bplay">&#9654;</span>
      <span class="btime">0:46 / 2:04</span>
      <span class="bspacer"></span>
      <span class="bexport">&#10515; export</span>
    </div>

    <div class="tl">
      <div class="ruler"><span>0:00</span><span>0:40</span><span>1:20</span><span>2:00</span></div>

      <div class="track">
        <span class="lab">SCENES</span>
        <div class="lane">
          <div class="clip sc" id="s1">1 &middot; WHAT</div>
          <div class="clip sc" id="s2">2 &middot; MODES</div>
          <div class="clip sc" id="s3">3 &middot; TIME</div>
          <div class="clip sc" id="s4">4 &middot; SCENE</div>
        </div>
      </div>

      <div class="track">
        <span class="lab">SCRIPT</span>
        <div class="lane">
          <div class="clip ln" id="ln1"></div>
          <div class="clip ln" id="ln2"></div>
          <div class="clip ln" id="ldrag"></div>
          <div class="clip ln" id="ln3"></div>
        </div>
      </div>

      <div class="track">
        <span class="lab">CAPTIONS</span>
        <div class="lane">
          <div class="clip cap" id="cp1"></div>
          <div class="clip cap" id="cp2"></div>
        </div>
      </div>

      <div class="track">
        <span class="lab">VOICE</span>
        <div class="lane">
          <div class="vwave" id="vw">
            <i style="height:30%"></i><i style="height:64%"></i><i style="height:88%"></i>
            <i style="height:52%"></i><i style="height:74%"></i><i style="height:40%"></i>
            <i style="height:90%"></i><i style="height:58%"></i><i style="height:34%"></i>
            <i style="height:70%"></i><i style="height:96%"></i><i style="height:48%"></i>
            <i style="height:62%"></i><i style="height:82%"></i><i style="height:38%"></i>
            <i style="height:56%"></i><i style="height:78%"></i><i style="height:44%"></i>
          </div>
        </div>
      </div>

      <div class="playhead" id="ph"></div>
      <div class="snapline" id="snap"></div>
    </div>
  </div>
</div>

<div id="caption"></div>
