<!-- A mini studio: mode tabs on top (TIMELINE / SCENE), a stage, the global
     timeline of draggable clips, and the SCENE inspector with its tabs. -->
<div class="ovl on" id="o2" style="transition:none">
  <div class="frame" id="frame">
    <div class="modes" id="modes">
      <span class="mode" id="mTl">F3 &middot; TIMELINE</span>
      <span class="mode" id="mScene">F4 &middot; SCENE</span>
    </div>
    <div class="stage" id="stage">STAGE</div>
    <div class="tl" id="tl">
      <div class="ruler"><span>0:00</span><span>1:00</span><span>2:00</span></div>
      <div class="track">
        <span class="lab">SCENES</span>
        <div class="clip sc" id="cl1">1</div>
        <div class="clip sc" id="cl2">2</div>
        <div class="clip sc" id="cl3">3</div>
      </div>
      <div class="track">
        <span class="lab">SCRIPT</span>
        <div class="clip ln el" id="cl4"></div>
        <div class="clip ln el" id="cl5"></div>
      </div>
      <div class="playhead" id="ph"></div>
    </div>
  </div>

  <!-- SCENE-mode inspector: in-place text edit + the TEXT | LOOK | TIMING tabs -->
  <div class="insp" id="insp">
    <div class="tabs">
      <span class="tab" id="tabText">TEXT</span>
      <span class="tab" id="tabLook">LOOK</span>
      <span class="tab" id="tabTiming">TIMING</span>
    </div>
    <div class="caret" id="caret">click on the frame to edit text in place&#9646;</div>
  </div>

  <div class="badges">
    <div class="badge" id="snap">&harr; clips snap to the playhead</div>
    <div class="badge" id="undo">&#8984;Z undo every edit</div>
    <div class="badge" id="restyle">retype &amp; restyle write back to disk</div>
  </div>
</div>

<div id="caption"></div>
