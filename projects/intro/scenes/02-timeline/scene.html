<!-- A mini studio: stage on top, one global timeline of draggable clips below. -->
<div class="ovl on" id="o2" style="transition:none">
  <div class="frame el" id="frame">
    <div class="stage el" id="stage">STAGE</div>
    <div class="tl el" id="tl">
      <div class="ruler"><span>0:00</span><span>1:00</span><span>2:00</span></div>
      <div class="track">
        <span class="lab">SCENES</span>
        <div class="clip sc el" id="cl1">1</div>
        <div class="clip sc el" id="cl2">2</div>
        <div class="clip sc el" id="cl3">3</div>
      </div>
      <div class="track">
        <span class="lab">SCRIPT</span>
        <div class="clip ln el" id="cl4"></div>
        <div class="clip ln el" id="cl5"></div>
      </div>
      <div class="playhead el" id="ph"></div>
    </div>
  </div>
  <div class="badges">
    <div class="badge el" id="snap">&harr; clips snap to the playhead</div>
    <div class="badge el" id="undo">&#8984;Z undo every edit</div>
  </div>
</div>

<div id="caption"></div>
