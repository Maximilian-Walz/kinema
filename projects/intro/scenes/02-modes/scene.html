<!-- The mode switcher: four chips like the real one (RECORD/TUNE/TIME/SCENE,
     F1-F4). Each lights in turn as the narration names it, then all glow on the
     recap. One descriptor line fades in per mode. -->
<div class="ovl on" id="o2" style="transition:none">
  <div class="heading" id="hd">ONE WINDOW &middot; FOUR MODES</div>

  <div class="switch" id="switch">
    <div class="chip2" id="cRec"><span class="k">F1</span><span class="n">RECORD</span></div>
    <div class="chip2" id="cTune"><span class="k">F2</span><span class="n">TUNE</span></div>
    <div class="chip2" id="cTime"><span class="k">F3</span><span class="n">TIME</span></div>
    <div class="chip2" id="cScene"><span class="k">F4</span><span class="n">SCENE</span></div>
  </div>

  <div class="desc">
    <div class="line" id="dRec"><b>RECORD</b> read your script off a teleprompter, capture your voice</div>
    <div class="line" id="dTune"><b>TUNE</b> audition every take, polish the sound</div>
    <div class="line" id="dTime"><b>TIME</b> place every scene on one global clock</div>
    <div class="line" id="dScene"><b>SCENE</b> compose a single frame, element by element</div>
  </div>
</div>

<div id="caption"></div>
