<!-- Title + the core idea: a scene is three plain files. Two overlays; the
     second is opaque and simply covers the first, so no exit is needed. -->
<div class="ovl on" id="o1a" style="transition:none">
  <h1 id="title">Kinema</h1>
  <div class="sub" id="sub">plain web files &rarr; data&#8209;driven video</div>
  <div class="chip" id="proj">a video is a <b>project</b> &mdash; a folder of scenes</div>
</div>

<div class="ovl" id="o1b">
  <div class="heading">ONE SCENE = THREE FILES</div>
  <div class="files">
    <div class="file" id="fHtml"><div class="ext">scene.html</div><div class="d">markup</div></div>
    <div class="file" id="fCss"><div class="ext">scene.css</div><div class="d">styling</div></div>
    <div class="file" id="fJson"><div class="ext">scene.json</div><div class="d">timing + narration</div></div>
  </div>
  <div class="note" id="note">the files on disk are the whole video</div>
</div>

<div id="caption"></div>
