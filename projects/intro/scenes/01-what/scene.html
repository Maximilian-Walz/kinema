<!-- Title, then "a scene is three files". Two overlays that dissolve: the
     first is scheduled off exactly when the second enters, so they crossfade
     instead of the title bleeding through (or the frame dipping to black). -->
<div class="ovl on" id="o1a">
  <h1 id="title">Kinema</h1>
  <div class="sub" id="sub">web files in, video out</div>
</div>

<div class="ovl" id="o1b">
  <div class="heading">A SCENE IS THREE FILES</div>
  <div class="files">
    <div class="file" id="fHtml"><div class="ext"><i class="dot html"></i>scene.html</div><div class="d">what's on screen</div></div>
    <div class="file" id="fCss"><div class="ext"><i class="dot css"></i>scene.css</div><div class="d">how it looks</div></div>
    <div class="file" id="fJson"><div class="ext"><i class="dot json"></i>scene.json</div><div class="d">what happens when</div></div>
  </div>
  <div class="note" id="note">if you can edit a web page, you can edit this</div>
</div>

<div id="caption"></div>
