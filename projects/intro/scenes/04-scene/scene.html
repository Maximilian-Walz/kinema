<!-- A mock of SCENE mode: the live canvas on the left (an element selected, with
     a corner resize handle) and the inspector on the right with the real
     TEXT | LOOK | TIMING tab strip. One field group shows per tab. -->
<div class="ovl on" id="o4" style="transition:none">
  <div class="work" id="work">

    <div class="canvas" id="canvas">
      <div class="cchips">
        <span class="bchip">TIME</span><span class="bchip hot">SCENE</span>
      </div>
      <div class="el-head" id="elHead">Meet Kinema</div>
      <div class="el-card" id="elCard">a video is a project</div>
      <div class="selbox" id="selbox"><span class="handle" id="handle"></span></div>
    </div>

    <div class="insp" id="insp">
      <div class="itabs">
        <span class="itab" id="tabText">TEXT</span>
        <span class="itab" id="tabLook">LOOK</span>
        <span class="itab" id="tabTiming">TIMING</span>
      </div>
      <div class="ibody">
        <div class="ifield" id="fText">
          <label>on-screen text</label>
          <div class="iinput">Meet Kinema<b class="cur"></b></div>
        </div>
        <div class="ifield" id="fLook">
          <label>colour</label>
          <div class="swatches">
            <i style="background:#5b9bff"></i>
            <i class="sel" style="background:#7ee0c4"></i>
            <i style="background:#ffcf6b"></i>
            <i style="background:#ff5d6c"></i>
          </div>
        </div>
        <div class="ifield" id="fTiming">
          <label>entrance animation</label>
          <div class="idrop">rise + fade <span>&#9662;</span></div>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="caption"></div>
